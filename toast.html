<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      padding: 16px;
      background-color: #ffffff;
      border: 1px solid #e2e8f0;
      border-left: 6px solid #2563eb;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      height: 100vh;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
    }
    .title { font-size: 14px; font-weight: 600; color: #1e293b; margin: 0 0 4px 0; }
    .desc { font-size: 12px; color: #64748b; margin: 0; line-height: 1.4; }
    .actions { display: flex; justify-content: flex-end; gap: 8px; }
    button { font-size: 11px; font-weight: 500; padding: 6px 12px; border-radius: 6px; cursor: pointer; border: none; }
    .btn-dismiss { background-color: #f1f5f9; color: #475569; }
    .btn-dismiss:hover { background-color: #e2e8f0; }
    .btn-update { background-color: #2563eb; color: white; }
    .btn-update:hover { background-color: #1d4ed8; }
  </style>
</head>
<body>
  <div>
    <div class="title" id="toastTitle">✨ Update Available</div>
    <p class="desc">A new version of Voctrum WorkHub is ready. Update now for the latest features and stability fixes.</p>
  </div>
  <div class="actions">
    <button class="btn-dismiss" onclick="window.close()">Dismiss</button>
    <button class="btn-update" id="updateBtn">Update Now</button>
  </div>
  <script>
    const { ipcRenderer } = require('electron');
    
    // Dynamically catch version string passed from main process safely via query params
    const urlParams = new URLSearchParams(window.location.search);
    const version = urlParams.get('v');
    if (version) {
      document.getElementById('toastTitle').innerText = `✨ Update Available (v${version})`;
    }

    document.getElementById('updateBtn').addEventListener('click', () => {
      document.body.innerHTML = `
        <div style="display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; text-align: center;">
          <div class="title" style="margin-bottom: 4px;">Downloading Update...</div>
          <p class="desc">Downloading assets in the background.</p>
        </div>
      `;
      ipcRenderer.send('start-update-download');
    });
  </script>
</body>
</html>
